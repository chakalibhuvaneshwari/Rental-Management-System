{% extends 'base.html' %}
{% block title %}Add Property - Mini NoBroker{% endblock %}

{% block content %}
<div class="row justify-content-center" data-aos="fade-in">
    <div class="col-md-8">
        <div class="card property-card p-4 border-success border-2">
            <h3 class="mb-4 text-success"><i class="fa-solid fa-house-medical"></i> List New Property</h3>
            
            <form method="post" action="{% url 'add_property' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Property Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Spacious 2BHK in Gachibowli" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control" placeholder="e.g. Hyderabad" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Locality / Address</label>
                        <input type="text" name="location" class="form-control" placeholder="e.g. Near Hitech City" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Monthly Rent (₹)</label>
                        <input type="number" name="price" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Deposit (₹)</label>
                        <input type="number" name="deposit" class="form-control" required>
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Property Type</label>
                        <select name="property_type" class="form-select" required>
                            <option value="1BHK">1 BHK</option>
                            <option value="2BHK">2 BHK</option>
                            <option value="3BHK">3 BHK</option>
                            <option value="4BHK">4 BHK</option>
                            <option value="VILLA">VILLA</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Room Type</label>
                        <select name="room_type" class="form-select" required>
                            <option value="INDIVIDUAL">Individual</option>
                            <option value="SHARING">Sharing</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Sharing Capacity</label>
                        <input type="number" name="sharing_capacity" class="form-control" value="1" required>
                    </div>
                    
                    <div class="col-12 mb-3">
                        <label class="form-label">Amenities (Comma separated)</label>
                        <input type="text" name="amenities" class="form-control" placeholder="WiFi, AC, TV, Fridge">
                    </div>
                    
                    <div class="col-12 mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="4" required></textarea>
                    </div>
                    
                    <h5 class="mt-3 mb-3 border-bottom pb-2">Location & Media</h5>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Latitude (Optional)</label>
                        <input type="text" name="latitude" class="form-control" placeholder="e.g. 17.4483">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Longitude (Optional)</label>
                        <input type="text" name="longitude" class="form-control" placeholder="e.g. 78.3915">
                    </div>
                    
                    <div class="col-12 mb-4">
                        <label class="form-label">Property Image</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-success w-100 btn-lg"><i class="fa-solid fa-cloud-arrow-up"></i> Publish Listing</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
