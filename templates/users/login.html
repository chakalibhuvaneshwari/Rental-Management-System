{% extends 'base.html' %}
{% block title %}Login - Mini NoBroker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5" data-aos="fade-up">
    <div class="col-md-5">
        <div class="card property-card p-4">
            <h3 class="text-center mb-4"><i class="fa-solid fa-right-to-bracket text-primary"></i> Login</h3>
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <div class="mt-3 text-center">
                <p>Don't have an account? <a href="{% url 'register' %}">Sign up directly here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
